		    transition: 0.5s;

		.boton:hover{

/*
		#sig{

*/
		div#CentroControl{

		#comprobar {
		    display: inline-flex;
		    align-items: center;
		    justify-content: center;
		    width: 235px;

		    background: #141414;
		    color: #fff;

		    transition: .3s ease all;

		    overflow: hidden;
		}

		#comprobar span{
		    position: relative;
		    z-index: 2;
		    transition: .3s ease all;

		#comprobar::after{
		    content: "";
		    width: 100%;
		    position: absolute;
		    z-index: 1;
		    top: 0;
		    left: calc(-100% - 80px);
		    border-right: 50px solid transparent;
		    border-bottom: 50px solid #286cff;
		    
		    transition: .4s ease-in-out all;
		}

		#comprobar:hover::after {
		    left: 0;
		}

		._jeb {

		#cajaimagenes, #consola{

		}

		#irMenu {

			transform: translate(10px, 0px);
		}

		#irMenuText {

<body>

	<script type="text/javascript" src="javascript/sweetalert.js"></script>
	<script type="text/javascript">
		// /* Documento JavaScript --> Codigo de Emilio :'*/

		//Definimos las variables de entorno o globales
		var elemento;
		var elemento_repuesta;
		var id;
		var encontro;
		var src;
		var solucion;
		var consola;
		var boton;
		var may;
		var Rbuenas;

		comprobar = document.getElementById("comprobar");
		sig = document.getElementById("sig");

		comprobar.addEventListener("click", Comprobar, false);

		function iniciar(){
			// alert("Bienvenido a nuestro arrastra y pega💛💙❤");
			//Creamos un ARRAY para guardar la solución
			//de pregunta-respuesta
			solucion = [144,233,322,411];
			consola = document.getElementById("consola");
			conteo = 0;
			//Seleccionamos todos los objetos img que están en 
			//el contenedor con el id="cajaimagenes" y los colocamos en un
			//ARRAY que llamaremos "imagenes" (Preguntas)
			var imagenes = document.querySelectorAll("#cajaimagenes img");
			//Colocamos a la escucha las imagenes de ORIGEN
			for (var i=0; i<imagenes.length; i++){
				imagenes[i].addEventListener("dragstart", inicia_arrastre, false);
				imagenes[i].addEventListener("dragend", terminado, false);
			}
			//Seleccionamos los objetos DESTINO que están en el
			//contenedor con id="respuestas" (Respuestas)
			var respuestas = document.querySelectorAll("#respuestas section");
			//Colocamos a la escucha los objetos de DESTINO (Objetos de Respuesta)
			for (var i=0; i<respuestas.length; i++){
				respuestas[i].addEventListener("dragenter", function (e) {
					e.preventDefault();},false);
				respuestas[i].addEventListener("dragover", entrando, false);
				respuestas[i].addEventListener("drop", soltado, false);
				respuestas[i].addEventListener("dragleave", saliendo, false);
			}
		}

		function inicia_arrastre (e){
			//alert("Se inició el Arrastre");
			//Debemos identificar cuál objeto desencadenó la acción
			elemento = e.target;
			id =elemento.id;
			src = elemento.src;
			//consola.innerHTML = "Pregunta: " + id + " --> " + src;
			seleccionarElemento(e);
		}

		function terminado (e){
			//Debemos identificar cuál objeto desencadenó la acción
			elemento = e.target;

			caja1=document.getElementById("11");
			caja2=document.getElementById("22");
			caja3=document.getElementById("33");
			caja4=document.getElementById("44");

			if (encontro == 1){
				conteo++;
				elemento.style.visibility = "hidden";
				caja1.innerHTML=`<h1 align="center">En este lugar se dio la masacre de las bananeras</h1>`;
				caja2.innerHTML=`<h1 align="center">Ocultaron las cifras reales de muertos</h1>`;
				caja3.innerHTML=`<h1 align="center">El pueblo se se hizo escuchar de la siguiente manera</h1>`;
				caja4.innerHTML=`<h1 align="center">Fue el lugar especifico en el que ocurrio la masacre</h1>`;
			}else{
				// elemento_respuesta.style.background = "#FFFFFF";
				caja1.innerHTML=`<h1 align="center">En este lugar se dio la masacre de las bananeras</h1>`;
				caja2.innerHTML=`<h1 align="center">Ocultaron las cifras reales de muertos</h1>`;
				caja3.innerHTML=`<h1 align="center">El pueblo se se hizo escuchar de la siguiente manera</h1>`;
				caja4.innerHTML=`<h1 align="center">Fue el lugar especifico en el que ocurrio la masacre</h1>`;
			}
			seleccionarElemento(e);
		}

		function entrando (e){
			//alert("Entrando");
			e.preventDefault();
			elemento_repuesta = e.target;
			var id_repuesta = elemento_repuesta.id;
			//nsola.innerHTML = "Entrando --> " + id + "a Respuesta --> " + id_repuesta;
			//Buscamos si la respuesta es correcta:
			//Verificando si la pareja pregunta+respuesta
			//está en el Array ---> Solucion
			var buscar = id + id_repuesta;
			encontro = 0;
			for (var i=0; i<solucion.length; i++){
				if (buscar == solucion[i]){
					encontro = 1; //Se encontro la respuesta correcta
				}
			}

			caja1=document.getElementById("11");
			caja2=document.getElementById("22");
			caja3=document.getElementById("33");
			caja4=document.getElementById("44");

			if (encontro == 1){
			//consola.innerHTML = " **** CORRECTO...!!!"
				elemento_repuesta.style.background = "rgba(8,252,25,0.8)";
			}else{
				//var consola.innerHTML = " **** FALSO...!!!"
				elemento_repuesta.style.background = "#fa0d29";
			e.preventDefault();
			elemento_repuesta = e.target;
			elemento_repuesta.style.background = "#FFFFFF";
			caja1.innerHTML=` `;
			caja2.innerHTML=` `;
			caja3.innerHTML=` `;
			caja4.innerHTML=` `;
			}
		}

		function soltado (e){
			e.preventDefault();
			elemento_repuesta = e.target;
			if (encontro == 1){
				boton=boton+1;
				if (boton==4) {
					function sirva(){
					may=document.getElementById("may").style.display="block";
					
					Rbuenas++;
					if (Rbuenas==3) {
						alert("12345");
					}
				
						sirva();
					}
				}
				elemento_repuesta.innerHTML = `<img src="${src}"/>`;
			}	
					
		}
				//Asignamos y colocamos la imagen en la 
				//zona DESTINO
				
			
			//consola.innerHTML += elemento_repuesta.innerHTML;


		function saliendo(e) {
			//Si queremos que no haga nada el navegador
			//(resetear) el comportamiento por defecto
			var caja1=document.getElementById("11");
			var caja2=document.getElementById("22");
			var caja3=document.getElementById("33");
			var caja4=document.getElementById("44");
			e.preventDefault();
			elemento_repuesta = e.target;
			elemento_repuesta.style.background = "#FFFFFF";
			caja1.innerHTML=`<h1 align="center">En este lugar se dio la masacre de las bananeras</h1>`;
			caja2.innerHTML=`<h1 align="center">Ocultaron las cifras reales de muertos</h1>`;
			caja3.innerHTML=`<h1 align="center">El pueblo se se hizo escuchar de la siguiente manera</h1>`;
			caja4.innerHTML=`<h1 align="center">Fue el lugar especifico en el que ocurrio la masacre</h1>`;
		}

		//*************************************************************
		//Definimos las variables para la información del moviento

		var elementSelect = 0;
		var currentX = 0;
		var currentY = 0;
		var currentPosX = 0;
		var currentPosY = 0;

		function seleccionarElemento (evt){
			//Guardamos el elemento seleccionado
			currentX = evt.clientX;
			currentY = evt.clientY;
			//consola.innerHTML = " X: " + currentX + " - " + "Y: " + currentY;

			//Obtenemos las coordenadas de la pieza a mover
			currentPosX = parseFloat(elementSelect.getAttribute("x"));
			currentPosY = parseFloat(elementSelect.getAttribute("y"));
			//Agregamos el evento del movimiento a la imagen seleccionada
			elementSelect.setAttribute("onmousemove", "moverElemento(evt)");
		}

		function moverElemento(evt) {
			//consola.innerHTML += "";
			var dx = evt.clientX - currentX;
			var dy = evt.clientY - currentY;
			//Para que el elemento se mueva actualizamos
			//y asignamos la nueva posición
			currentPosX = currentPosX + dx;
			currentPosY = currentPosY + dy;
			//Volvemos a guardar la posición del mouse
			currentX = evt.clientX;
			currentY = evt.clientY;
			//Al soltar el click del mouse debemos soltar
			//la imagen elegida
			elementSelect.setAttribute("onmouseout", "deseleccionarElemento(evt)");
			elementSelect.setAttribute("onmouseup", "deseleccionarElemento(evt)");
		}


		function Comprobar(){
			if(conteo == 4){
				swal("Segundo Nivel Completado", "Ahora solo dale al boton siguiente para continuar", "success", {

					buttons: ["Continuar","Reintentar"]

				});
				sonidos.innerHTML = "";
				sonidos.innerHTML += `<audio id="correcto" src="audio/correcto.mp3" autoplay></audio>`;

				sig.style.display = "inline";
			} else{
			swal("¡Comprueba tus respuestas!", "Te has equivocado en al menos una o mas opciones", "warning", {

				buttons: ["Continuar","Reintentar"]

			});
			sonidos.innerHTML = "";
			sonidos.innerHTML += `<audio id="erroneo" src="audio/erroneo.mp3" autoplay></audio>`;
			}
		}



		window.addEventListener("load", iniciar, false);
	</script>
</body>
