<style type="text/css">

	#logo{width: 600px;

	.barra {

		height: 20px;
		position: relative;
		background: whitesmoke;

	.barra span {

		background: linear-gradient(90deg, rgba(255,215,0,1) 54%, rgba(9,0,106,1) 75%, rgba(195,18,18,1) 100%);

		overflow: hidden;
		animation: back 2.30s ;
		}
	@keyframes back {
		0% {width: 0%}
		100% {width: 100%}

</style>
