		#comprobar::after{

			z-index: 1;
			top: 0;
			left: calc(-100% - 80px);
			border-right: 50px solid transparent;
			border-bottom: 50px solid #286cff;
			
			transition: .4s ease-in-out all;

		#comprobar:hover::after {
